name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          arch: "win64_mingw"
          tools: "tools_mingw1310"
          cache: true

      # The action always exports IQTA_TOOLS and QT_ROOT_DIR regardless of
      # whether Qt was restored from cache or freshly installed. We rely on
      # these instead of computing paths ourselves, because the action adds an
      # implicit extra "Qt" subfolder to any custom dir value.
      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          $mingwBin = Join-Path $env:IQTA_TOOLS "mingw1310_64\bin"
          if (-not (Test-Path $mingwBin)) {
            Write-Host "MinGW not found at: $mingwBin"
            Write-Host "IQTA_TOOLS = $env:IQTA_TOOLS"
            Get-ChildItem $env:IQTA_TOOLS -ErrorAction SilentlyContinue | Select-Object Name
            exit 1
          }
          Write-Host "Adding to PATH: $mingwBin"
          Add-Content -Path $env:GITHUB_PATH -Value $mingwBin

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-mingw -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build-mingw --parallel

      - name: Install to staging
        run: cmake --install build-mingw --prefix build-mingw/install

      # NSIS is not pre-installed on the windows-2025 runner image.
      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      # Run cpack from the build directory so the installer .exe lands inside
      # it rather than in the repo root.
      - name: Create NSIS installer
        working-directory: build-mingw
        run: cpack -G NSIS --config CPackConfig.cmake

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashcards-studio-windows-installer
          path: build-mingw/*.exe

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-mingw/*.exe
